<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login form</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">            
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
  <div class="logo-section">
    <img src="Gold Premium Luxury Hotel Logo_20260605_122331_0000.png" alt="Davidferrari Logo">
  </div>
    <div class="wrapper">
<form action="">
    <h1>Login </h1>
    <div class="Input-box">
        <input type="email" placeholder= "Email address" required>
          <p id="emailError" class="error-message">
        Please enter a valid email address.
    </p>
   
          <p id="successMessage" class="success-message">
        Login successful!
          </p>
          
    </div>
    <div class="Input-box">
        <input type="password" placeholder="Password" required>
        <i class="bx bx-hide" id="toggleBtn"></i>
    </div>
    <div class="remember-forget">
    <label><input type="checkbox">Remember Me</label>
    <a href="forgot-password.html">Forgot Password</a>
    </div>
    <button type="submit" class="btn">Login</button>
    <div class="register-link">
        <p>Don't have a account? <a href="register.html">Register</a></p>
    </div>
</form>
    </div>
    <script src="script.js"></script>
</body>
</html>
